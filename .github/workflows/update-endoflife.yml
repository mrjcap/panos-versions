name: Update endoflife.date PAN-OS

on:
  push:
    branches: [master]
    paths: ['PaloAltoVersions.json']
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORK_REPO: mrjcap/endoflife.date
      UPSTREAM_REPO: endoflife-date/endoflife.date
      UPSTREAM_BRANCH: master
      PRODUCT_FILE: products/pan-os.md
      BRANCH_NAME: update-panos-versions
      PR_PREFIX: "[pan-os]"
      JSON_FILE: PaloAltoVersions.json
      SCRIPT_PATH: .github/scripts/update_panos_endoflife.py

    steps:
      - name: Checkout panos-versions
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch pan-os.md from upstream
        run: |
          curl -sL -o pan-os.md \
            https://raw.githubusercontent.com/${{ env.UPSTREAM_REPO }}/${{ env.UPSTREAM_BRANCH }}/${{ env.PRODUCT_FILE }}

      - name: Check for version updates
        id: check
        run: |
          output=$(python ${{ env.SCRIPT_PATH }} \
            --json ${{ env.JSON_FILE }} \
            --md pan-os.md \
            --output pan-os-updated.md)

          first_line=$(echo "$output" | head -1)
          if [ "$first_line" = "NO_UPDATES" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "No updates needed"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            summary=$(echo "$output" | tail -n +2)
            {
              echo "summary<<EOF"
              echo "$summary"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "Updates found:"
            echo "$summary"

            # Dynamic PR title suffix
            count=$(echo "$summary" | wc -l)
            if [ "$count" -eq 1 ]; then
              title_suffix=$(echo "$summary" | sed 's/ -> / → /')
            else
              cycles=$(echo "$summary" | cut -d: -f1 | paste -sd ", ")
              title_suffix="$cycles ($count cycles)"
            fi
            echo "title_suffix=$title_suffix" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing open PRs
        if: steps.check.outputs.has_updates == 'true'
        id: pr_check
        env:
          GH_TOKEN: ${{ secrets.ENDOFLIFE_PAT }}
        run: |
          count=$(gh pr list \
            --repo ${{ env.UPSTREAM_REPO }} \
            --state open \
            --author ${{ github.repository_owner }} \
            --search "${{ env.PR_PREFIX }}" \
            --json number \
            --jq 'length')

          if [ "$count" -gt "0" ]; then
            echo "pr_exists=true" >> "$GITHUB_OUTPUT"
            echo "Open PR already exists, skipping"
          else
            echo "pr_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cleanup merged branch
        if: steps.check.outputs.has_updates == 'true' && steps.pr_check.outputs.pr_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.ENDOFLIFE_PAT }}
        run: |
          gh api repos/${{ env.FORK_REPO }}/git/refs/heads/${{ env.BRANCH_NAME }} \
            -X DELETE 2>/dev/null || true

      - name: Sync fork with upstream
        if: steps.check.outputs.has_updates == 'true' && steps.pr_check.outputs.pr_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.ENDOFLIFE_PAT }}
        run: |
          gh api repos/${{ env.FORK_REPO }}/merge-upstream \
            -f branch=${{ env.UPSTREAM_BRANCH }}

      - name: Checkout fork
        if: steps.check.outputs.has_updates == 'true' && steps.pr_check.outputs.pr_exists == 'false'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FORK_REPO }}
          token: ${{ secrets.ENDOFLIFE_PAT }}
          path: fork

      - name: Create branch and apply changes
        if: steps.check.outputs.has_updates == 'true' && steps.pr_check.outputs.pr_exists == 'false'
        run: |
          cd fork
          git config user.name "${{ vars.GIT_NAME }}"
          git config user.email "${{ vars.GIT_EMAIL }}"

          git fetch origin ${{ env.UPSTREAM_BRANCH }}
          git checkout -B ${{ env.BRANCH_NAME }} origin/${{ env.UPSTREAM_BRANCH }}

          cp ../pan-os-updated.md ${{ env.PRODUCT_FILE }}
          git add ${{ env.PRODUCT_FILE }}

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "${{ env.PR_PREFIX }} Update ${{ steps.check.outputs.title_suffix }}"
          git push -f origin ${{ env.BRANCH_NAME }}

      - name: Create Pull Request
        if: steps.check.outputs.has_updates == 'true' && steps.pr_check.outputs.pr_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.ENDOFLIFE_PAT }}
        run: |
          gh pr create \
            --repo ${{ env.UPSTREAM_REPO }} \
            --base ${{ env.UPSTREAM_BRANCH }} \
            --head ${{ github.repository_owner }}:${{ env.BRANCH_NAME }} \
            --title "${{ env.PR_PREFIX }} Update ${{ steps.check.outputs.title_suffix }}" \
            --body "$(cat <<EOF
          ## Summary
          Automated update of PAN-OS versions.

          ### Changes
          ${{ steps.check.outputs.summary }}

          ---
          Data sourced from [PaloAltoVersions.json](https://github.com/${{ github.repository }}/blob/master/${{ env.JSON_FILE }})
          EOF
          )"
